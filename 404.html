<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | BFStock</title>
    <meta name="robots" content="noindex, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --muted: #94a3b8; --mythical: #f87171; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
        body { background: var(--bg); color: #fff; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(248, 113, 113, 0.05), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(96, 165, 250, 0.05), transparent 40%);
        }
        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.1));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.15));
        }
        .title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1.5px;
        }
        .title span { color: var(--mythical); }
        .description {
            color: var(--muted);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto 3rem;
            line-height: 1.6;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }
        .btn-back:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255,255,255,0.2);
            background: #f87171;
            color: #fff;
        }
        .floating-asset {
            position: absolute;
            width: 300px;
            height: 300px;
            opacity: 0.05;
            filter: blur(2px);
            z-index: -1;
            animation: float 10s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -50px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }
    </style>
</head>
<body>

<div style="position:relative;z-index:1;padding:2rem;">
    <img src="assets/fruits/Dragon.webp" class="floating-asset" style="top: 10%; left: 10%;" alt="">
    <img src="assets/fruits/Kitsune.webp" class="floating-asset" style="bottom: 10%; right: 10%; animation-delay: -5s;" alt="">
    
    <div class="error-code">404</div>
    <h1 class="title">You've reached <span>Unknown Waters</span></h1>
    <p class="description">The page you're searching for was eaten by a Sea Beast or lost in the Second Sea.</p>
    
    <a href="/" class="btn-back">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        Back to Safe Harbor
    </a>
</div>

</body>
</html>
