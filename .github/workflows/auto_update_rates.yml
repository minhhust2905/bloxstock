name: Auto Update Stock Rates

on:
  schedule:
    # Chạy vào lúc 00:00 sáng Thứ Hai hàng tuần (UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # Cho phép kích hoạt bằng tay từ giao diện GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Cần token để push commit lại vào repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper (calc_rates.py)
        run: python nghiencuu/calc_rates.py

      - name: Merge Data (merge_data.py)
        run: python nghiencuu/merge_data.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Stock Chances & Historical Cycles"
          branch: main
          file_pattern: "assets/data/fruits.json nghiencuu/observed_rates.json"
          commit_user_name: "BloxStock Bot"
          commit_user_email: "actions@github.com"
          commit_author: "BloxStock Bot <actions@github.com>"
