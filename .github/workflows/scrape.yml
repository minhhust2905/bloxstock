name: Scrape Stock

on:
  schedule:
    - cron: "2,15,30,45 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python scraper/scrape.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock.json data/history.json
          git commit -m "update stock" || echo "no changes"
          git pull --rebase origin master
          git push