<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta -->
    <title>BFStock - Blox Fruits Stock Tracker</title>
    <meta name="description" content="Ultimate Blox Fruits Stock Tracker. Check real-time stock for Kitsune, Dragon, Leopard and more. Automatically updated every 4 hours with full history logs.">
    <meta name="theme-color" content="#05070a">

    <!-- Open Graph / Discord / Zalo -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bfstock.pages.dev/">
    <meta property="og:title" content="BFStock - Blox Fruits Stock Tracker">
    <meta property="og:description" content="Check which devil fruits are in the Blox Fruits shop right now. Auto-updated every 4 hours.">
    <meta property="og:image" content="https://bfstock.pages.dev/assets/fruits/Dragon.webp">

    <!-- Canonical & Robots -->
    <link rel="canonical" href="https://bfstock.pages.dev/">
    <meta name="robots" content="index, follow">
    
    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"></noscript>
    
    <script>
        // Start fetching data immediately before body renders to crush LCP times
        window._initialStockFetch = fetch('data/stock.json?t=' + Math.floor(Date.now() / 60000)).then(r => r.json()).catch(() => null);
    </script>
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.2);
            --text: #ffffff;
            --muted: #94a3b8;
            --common: #9ca3af;
            --uncommon: #4ade80;
            --rare: #60a5fa;
            --legendary: #c084fc;
            --mythical: #f87171;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }

        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse 80% 50% at 50% -10%, #1e293b, transparent);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── HEADER ─── */
        header {
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            position: relative;
        }
        .brand {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 30%, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1.5rem;
        }
        .brand span { color: #f87171; -webkit-text-fill-color: #f87171; }

        /* ─── FLIP CLOCK ─── */
        .countdown-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .countdown-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
        }
        .flip-clock {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .flip-seg {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }
        .flip-num {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            position: relative;
            overflow: hidden;
        }

        .flip-unit {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
        }
        .flip-colon {
            font-size: 1.8rem;
            font-weight: 800;
            color: rgba(255,255,255,0.2);
            margin-bottom: 1.2rem;
            line-height: 1;
        }
        .flip-num.urgent { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }

        /* ─── PLAY BUTTON ─── */
        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 0;
            border-radius: 50px;
            overflow: hidden;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 28px var(--btn-glow, rgba(239,68,68,0.3));
        }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 44px var(--btn-glow, rgba(239,68,68,0.5)); }
        .play-btn-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.25);
            flex-shrink: 0;
        }
        .play-btn-icon img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.3));
        }
        .play-btn-text {
            padding: 0 1.4rem 0 1rem;
            color: #fff;
            height: 44px;
            display: flex;
            align-items: center;
        }

        .pill {
            font-size: 0.8rem;
            padding: 0.35rem 0.9rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--muted);
        }

        /* ─── RARITY FILTER ─── */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }
        .rf-btn {
            padding: 0.4rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: transparent;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .rf-btn:hover { border-color: var(--border-hover); color: #fff; }
        .rf-btn.active { background: rgba(255,255,255,0.1); border-color: var(--rf-color, #fff); color: var(--rf-color, #fff); box-shadow: 0 0 12px var(--rf-glow, transparent); }
        
        .rf-mythical    { --rf-color: var(--mythical); --rf-glow: rgba(248,113,113,0.3); }
        .rf-legendary   { --rf-color: var(--legendary); --rf-glow: rgba(192,132,252,0.3); }
        .rf-rare        { --rf-color: var(--rare); --rf-glow: rgba(96,165,250,0.3); }
        .rf-uncommon    { --rf-color: var(--uncommon); --rf-glow: rgba(74,222,128,0.3); }
        .rf-common      { --rf-color: var(--common); --rf-glow: rgba(156,163,175,0.3); }

        /* ─── TABS ─── */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0 2rem 2rem;
        }
        .tab-btn {
            padding: 0.5rem 1.4rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            color: #fff;
        }

        /* ─── MAIN ─── */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ─── STOCK GRID ─── */
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.2rem;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.35s cubic-bezier(.175,.885,.32,1.275), border-color 0.3s, box-shadow 0.3s;
            cursor: default;
            animation: cardAppear 0.5s backwards;
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            animation: shineOnEntry 0.8s forwards;
            animation-delay: inherit;
        }
        @keyframes shineOnEntry {
            0% { left: -100%; }
            100% { left: 200%; }
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 80% 10%, var(--rc, transparent), transparent 65%);
            opacity: 0.12;
            pointer-events: none;
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--border-hover);
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
        }
        .card:hover .fruit-img { transform: scale(1.08) rotate(-2deg); }

        /* ─── MYTHICAL PRIORITY ─── */
        .card.rc-mythical {
            border-color: rgba(248, 113, 113, 0.4);
            box-shadow: 0 0 20px rgba(248, 113, 113, 0.1);
            animation: cardAppearMythical 0.8s cubic-bezier(.175,.885,.32,1.275) backwards, mythicalPulse 2s infinite alternate ease-in-out;
        }
        .card.rc-mythical::after {
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            animation-duration: 1.2s;
        }
        @keyframes cardAppearMythical {
            from { opacity: 0; transform: translateY(60px) scale(0.5) rotate(-3deg); filter: brightness(3) blur(5px); }
            to { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); filter: brightness(1) blur(0px); }
        }
        @keyframes mythicalPulse {
            from { box-shadow: 0 0 15px rgba(248, 113, 113, 0.15); border-color: rgba(248, 113, 113, 0.4); }
            to { box-shadow: 0 0 35px rgba(248, 113, 113, 0.3); border-color: rgba(248, 113, 113, 0.7); }
        }

        /* ─── LEGENDARY STYLE ─── */
        .card.rc-legendary {
            border-color: rgba(192, 132, 252, 0.3);
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.1);
            animation: cardAppearLegendary 0.6s ease-out backwards;
        }
        @keyframes cardAppearLegendary {
            from { opacity: 0; transform: translateY(30px) scale(0.85); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .rarity-badge {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            background: var(--rc, #555);
            box-shadow: 0 0 14px var(--rc, transparent);
            color: #fff;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }
        .fruit-img-wrap { width: 140px; height: 140px; margin-bottom: 0.8rem; position: relative; z-index: 1; }
        .fruit-img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.35s ease; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4)); }
        .fruit-name { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.2rem; position: relative; z-index: 1; }
        .fruit-type { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; position: relative; z-index: 1; }
        .prices { display: flex; gap: 0.6rem; width: 100%; margin-top: auto; position: relative; z-index: 1; }
        .price-box {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.4rem;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .flip-seg { display: flex; flex-direction: column; align-items: center; }
        .flip-num { font-size: 2.8rem; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 0.2rem; }
        .flip-unit { font-size: 0.65rem; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; font-weight: 700; }
        .flip-colon { font-size: 2rem; font-weight: 800; color: rgba(255,255,255,0.2); margin-top: -1.2rem; }

        /* ─── RESTOCKING STATE ─── */
        #restocking-label {
            display: none;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--mythical);
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: restockPulse 1.5s infinite;
        }
        @keyframes restockPulse {
            0%, 100% { opacity: 1; filter: brightness(1.5) drop-shadow(0 0 10px var(--mythical)); }
            50% { opacity: 0.4; filter: brightness(1) drop-shadow(0 0 0px transparent); }
        }
        .is-restocking .flip-clock { display: none; }
        .is-restocking #restocking-label { display: block; }
        .is-restocking .countdown-label { opacity: 0.5; }

        .play-btn { color: #60a5fa; }
        /* ─── MIRAGE SECTION ─── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 2.5rem 0 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .section-header h2 { font-size: 1.5rem; font-weight: 800; }
        .section-header .badge {
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            font-size: 0.65rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .mirage-card {
            border-color: rgba(96, 165, 250, 0.2) !important;
            background: linear-gradient(180deg, rgba(96, 165, 250, 0.05) 0%, rgba(0,0,0,0) 100%) !important;
        }

        .price-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .price-val { font-size: 0.9rem; font-weight: 700; }
        .beli { color: #4ade80; }
        .robux { color: #60a5fa; }

        /* Rarity color bindings */
        .rc-common    { --rc: var(--common); }
        .rc-uncommon  { --rc: var(--uncommon); }
        .rc-rare      { --rc: var(--rare); }
        .rc-legendary { --rc: var(--legendary); }
        .rc-mythical  { --rc: var(--mythical); }

        /* ─── SKELETON ─── */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.2rem;
        }
        .skeleton-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        .sk { background: rgba(255,255,255,0.06); border-radius: 8px; animation: pulse 1.5s ease-in-out infinite; }
        .sk-badge { width: 60px; height: 18px; border-radius: 50px; margin-bottom: 0.75rem; }
        .sk-img { width: 140px; height: 140px; border-radius: 20px; margin-bottom: 0.8rem; }
        .sk-name { width: 120px; height: 24px; border-radius: 4px; margin-bottom: 0.2rem; }
        .sk-type { width: 80px; height: 14px; border-radius: 4px; margin-bottom: 1rem; }
        .sk-prices { display: flex; gap: 0.6rem; width: 100%; margin-top: auto; }
        .sk-price { flex: 1; height: 42px; border-radius: 10px; }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* ─── HISTORY TIMELINE ─── */
        .history-timeline {
            position: relative;
            padding-left: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .history-timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 10px;
            bottom: 0;
            width: 2px;
            background: var(--border);
            z-index: 0;
        }
        .timeline-item {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.2rem;
            transition: transform 0.2s, border-color 0.2s;
        }
        .timeline-item:hover {
            border-color: var(--border-hover);
            transform: translateX(4px);
        }
        .timeline-dot {
            position: absolute;
            left: -2.4rem;
            top: 1.5rem;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--bg);
            border: 3px solid var(--rc, var(--muted));
            box-shadow: 0 0 10px var(--rc, transparent);
            z-index: 2;
        }
        .timeline-time {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .timeline-fruits {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
        }
        .tl-fruit {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--rc, var(--border));
            padding: 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.2s, background 0.2s;
            cursor: default;
        }
        .tl-fruit:hover {
            transform: scale(1.15) translateY(-2px);
            z-index: 2;
            background: rgba(255,255,255,0.1);
        }
        .tl-fruit img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }
        .tl-fruit::after {
            content: attr(data-name);
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            font-weight: 600;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tl-fruit:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(-2px);
        }

        /* ─── FOOTER ─── */
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.75rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
            line-height: 1.8;
        }
        footer a { color: var(--muted); }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 600px) {
            .brand { font-size: 2.5rem; }
            .container { padding: 0 0.75rem 3rem; }
            .flip-num { width: 52px; height: 52px; font-size: 1.4rem; }
            .flip-colon { font-size: 1.4rem; }

            .stock-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
            .card { padding: 1rem 0.75rem; border-radius: 16px; }
            .fruit-img-wrap { width: 90px; height: 90px; margin-bottom: 0.5rem; }
            .rarity-badge { font-size: 0.55rem; padding: 0.2rem 0.55rem; margin-bottom: 0.5rem; }
            .fruit-name { font-size: 1.05rem; }
            .fruit-type { font-size: 0.7rem; margin-bottom: 0.75rem; }
            .price-label { font-size: 0.55rem; }
            .price-val { font-size: 0.8rem; }
            .price-box { padding: 0.4rem 0.3rem; }

            .skeleton-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            .skeleton-card { padding: 1rem 0.75rem; border-radius: 16px; }
            .sk-img { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">BF<span>Stock</span></div>

    <!-- Accessible countdown region -->
    <div class="countdown-wrap" id="countdown-wrap" role="timer" aria-live="polite" aria-label="Time until next stock reset">
        <div class="countdown-label">Resets in</div>
        <div id="restocking-label" aria-label="New stock is loading">Restocking...</div>
        <div class="flip-clock">
            <div class="flip-seg">
                <div class="flip-num" id="cd-h">--</div>
                <div class="flip-unit">hrs</div>
            </div>
            <div class="flip-colon">:</div>
            <div class="flip-seg">
                <div class="flip-num" id="cd-m">--</div>
                <div class="flip-unit">min</div>
            </div>
            <div class="flip-colon">:</div>
            <div class="flip-seg">
                <div class="flip-num" id="cd-s">--</div>
                <div class="flip-unit">sec</div>
            </div>
        </div>
    </div>

    <a href="roblox://experiences/start?placeId=2753915549" class="play-btn" id="play-btn"
       aria-label="Join Blox Fruits game on Roblox"
       style="background: linear-gradient(135deg, #ef4444, #f97316);">
        <div class="play-btn-icon">
            <img id="play-btn-img" src="" alt="" width="32" height="32" aria-hidden="true" onerror="this.style.display='none'">
        </div>
        <span class="play-btn-text">Join Blox Fruits</span>
    </a>
</header>

<!-- Tab navigation with ARIA -->
<div class="tabs" role="tablist" aria-label="Stock views">
    <button class="tab-btn active" data-tab="stock" role="tab" aria-selected="true" aria-controls="tab-stock" id="btn-stock">📦 Normal</button>
    <button id="btn-mirage" class="tab-btn" data-tab="mirage" role="tab" aria-selected="false" aria-controls="tab-mirage">🌌 Mirage</button>
    <button class="tab-btn" data-tab="history" role="tab" aria-selected="false" aria-controls="tab-history" id="btn-history">📜 History</button>
</div>

<main class="container">
    <!-- NORMAL STOCK TAB -->
    <div id="tab-stock" class="tab-panel active" role="tabpanel" aria-labelledby="btn-stock">
        <div id="skeleton" class="skeleton-grid">
            <!-- Skeleton cards -->
            <div class="skeleton-card"><div class="sk sk-badge"></div><div class="sk sk-img"></div><div class="sk sk-name"></div><div class="sk sk-type"></div><div class="sk-prices"><div class="sk sk-price"></div><div class="sk sk-price"></div></div></div>
            <div class="skeleton-card"><div class="sk sk-badge"></div><div class="sk sk-img"></div><div class="sk sk-name"></div><div class="sk sk-type"></div><div class="sk-prices"><div class="sk sk-price"></div><div class="sk sk-price"></div></div></div>
            <div class="skeleton-card"><div class="sk sk-badge"></div><div class="sk sk-img"></div><div class="sk sk-name"></div><div class="sk sk-type"></div><div class="sk-prices"><div class="sk sk-price"></div><div class="sk sk-price"></div></div></div>
            <div class="skeleton-card"><div class="sk sk-badge"></div><div class="sk sk-img"></div><div class="sk sk-name"></div><div class="sk sk-type"></div><div class="sk-prices"><div class="sk sk-price"></div><div class="sk sk-price"></div></div></div>
        </div>
        <div id="stock-grid" class="stock-grid" style="display:none;"></div>
    </div>

    <!-- MIRAGE STOCK TAB -->
    <div id="tab-mirage" class="tab-panel" role="tabpanel" aria-labelledby="btn-mirage">
        <div class="section-header" style="margin-top:0;">
            <h2>Mirage Stock</h2>
            <span class="badge">Limited Shop</span>
        </div>
        <div id="mirage-grid" class="stock-grid">
            <div style="text-align:center;padding:4rem 2rem;color:var(--muted);grid-column:1/-1;">
                Mirage Island is currently hidden...
            </div>
        </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="tab-panel" role="tabpanel" aria-labelledby="btn-history">
        <div class="filter-container" id="history-filter" role="group" aria-label="Filter by rarity">
            <button class="rf-btn active" data-rarity="all">All</button>
            <button class="rf-btn rf-mythical" data-rarity="mythical">Mythical</button>
            <button class="rf-btn rf-legendary" data-rarity="legendary">Legendary</button>
            <button class="rf-btn rf-rare" data-rarity="rare">Rare</button>
            <button class="rf-btn rf-uncommon" data-rarity="uncommon">Uncommon</button>
            <button class="rf-btn rf-common" data-rarity="common">Common</button>
        </div>
        <div id="history-list" class="history-timeline">
            <div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.85rem;">Loading history…</div>
        </div>
    </div>
</main>

<footer>
    <p>BFStock is a fan-made tool, not affiliated with Gamer Robot Inc. or Roblox Corporation.</p>
    <p>Data is automatically sourced from <a href="https://blox-fruits.fandom.com/wiki/Blox_Fruits_%22Stock%22" target="_blank">Blox Fruits Wiki</a>.</p>
</footer>

<script>
    // ─── TABS ───
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
                b.setAttribute('aria-selected', 'false');
            });
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            btn.setAttribute('aria-selected', 'true');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            if (btn.dataset.tab === 'history') loadHistory();
        });
    });

    // ─── RARITY CONFIG ───
    const RC = {
        common: 'rc-common', uncommon: 'rc-uncommon',
        rare: 'rc-rare', legendary: 'rc-legendary', mythical: 'rc-mythical'
    };
    const RARITY_RANK = { mythical:5, legendary:4, rare:3, uncommon:2, common:1 };
    const RARITY_COLOR = {
        mythical:  { bg: 'linear-gradient(135deg, #f87171, #ef4444)', glow: 'rgba(248,113,113,0.4)' },
        legendary: { bg: 'linear-gradient(135deg, #c084fc, #a855f7)', glow: 'rgba(192,132,252,0.4)' },
        rare:      { bg: 'linear-gradient(135deg, #60a5fa, #3b82f6)', glow: 'rgba(96,165,250,0.4)'  },
        uncommon:  { bg: 'linear-gradient(135deg, #4ade80, #22c55e)', glow: 'rgba(74,222,128,0.4)'  },
        common:    { bg: 'linear-gradient(135deg, #9ca3af, #6b7280)', glow: 'rgba(156,163,175,0.3)' },
    };

    // ─── COUNTDOWN ───
    let lastUpdated = '';
    window.isWaitingForNewData = false;

    function getNextReset() {
        const now = new Date();
        const h = now.getUTCHours();
        const nextH = Math.ceil((h + 0.001) / 4) * 4;
        const next = new Date(now);
        next.setUTCHours(nextH, 0, 0, 0);
        return next;
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function tickCountdown() {
        const diff = getNextReset() - Date.now();
        const wrap = document.getElementById('countdown-wrap');
        const urgent = diff < 300000;
        const cdH = document.getElementById('cd-h');
        const cdM = document.getElementById('cd-m');
        const cdS = document.getElementById('cd-s');

        // Force restocking mode if we are waiting for new data or reached zero
        if (diff <= 0 || window.isWaitingForNewData) {
            wrap.classList.add('is-restocking');
            window.isWaitingForNewData = true;
            if (!window._fastPoll) window._fastPoll = setInterval(loadStock, 15000);
            return;
        }
        
        wrap.classList.remove('is-restocking');
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        cdH.textContent = pad(h);
        cdM.textContent = pad(m);
        cdS.textContent = pad(s);
        [cdH, cdM, cdS].forEach(el => el.classList.toggle('urgent', urgent));

        if (diff < 90000) {
            if (!window._fastPoll) window._fastPoll = setInterval(loadStock, 20000);
        } else {
            if (window._fastPoll) { clearInterval(window._fastPoll); window._fastPoll = null; }
        }
    }
    setInterval(tickCountdown, 1000);
    tickCountdown();

    // ─── LOAD STOCK ───
    async function loadStock() {
        try {
            let data;
            if (window._initialStockFetch) {
                data = await window._initialStockFetch;
                window._initialStockFetch = null;
            } else {
                const res = await fetch('data/stock.json?t=' + Date.now());
                data = await res.json();
            }
            
            if (!data || data.updated === lastUpdated) return;
            
            lastUpdated = data.updated;
            window.isWaitingForNewData = false; // Data has changed! Stop restocking mode.
            historyData = []; // Invalidate history cache so next open will re-fetch

            // Sort by Rarity Rank first, then Price
            data.stock.sort((a, b) => {
                const rA = RARITY_RANK[a.rarity.toLowerCase()] || 0;
                const rB = RARITY_RANK[b.rarity.toLowerCase()] || 0;
                if (rB !== rA) return rB - rA;
                return b.price - a.price;
            });

            // Update play button with top rarity fruit
            const top = data.stock[0];
            if (top) {
                const rKey = top.rarity.toLowerCase();
                const col = RARITY_COLOR[rKey] || RARITY_COLOR.common;
                const btn = document.getElementById('play-btn');
                const img = document.getElementById('play-btn-img');
                btn.style.background = col.bg;
                btn.style.setProperty('--btn-glow', col.glow);
                img.src = `assets/fruits/${top.name}.webp`;
                img.style.display = '';
            }

            const frag = document.createDocumentFragment();
            data.stock.forEach((f, idx) => {
                const rc = RC[f.rarity.toLowerCase()] || '';
                const beli = new Intl.NumberFormat('en-US').format(f.price);
                const robux = new Intl.NumberFormat('en-US').format(f.robux);
                const card = document.createElement('div');
                card.className = `card ${rc}`;
                card.style.animationDelay = `${idx * 0.05}s`;
                
                const badge = document.createElement('span');
                badge.className = 'rarity-badge';
                badge.textContent = f.rarity;
                const imgWrap = document.createElement('div');
                imgWrap.className = 'fruit-img-wrap';
                const img = document.createElement('img');
                img.className = 'fruit-img';
                img.src = `assets/fruits/${f.name}.webp`;
                img.alt = `${f.name} devil fruit`;
                img.width = 140;
                img.height = 140;
                if (idx === 0) img.setAttribute('fetchpriority', 'high');
                img.loading = idx < 4 ? 'eager' : 'lazy';
                img.decoding = 'async';
                img.onerror = function(){ this.style.opacity = 0.3; };
                imgWrap.appendChild(img);
                const name = document.createElement('div');
                name.className = 'fruit-name';
                name.textContent = f.name;
                const type = document.createElement('div');
                type.className = 'fruit-type';
                type.textContent = f.type;
                const prices = document.createElement('div');
                prices.className = 'prices';
                prices.innerHTML = `<div class="price-box"><span class="price-label">Beli</span><span class="price-val beli">${beli}</span></div><div class="price-box"><span class="price-label">Robux</span><span class="price-val robux">${robux}</span></div>`;
                card.append(badge, imgWrap, name, type, prices);
                frag.appendChild(card);
            });

            const grid = document.getElementById('stock-grid');
            grid.innerHTML = '';
            grid.appendChild(frag);
            document.getElementById('skeleton').style.display = 'none';
            grid.style.display = 'grid';

            // Render Mirage Stock
            const mirageGrid = document.getElementById('mirage-grid');
            if (data.mirageStock && data.mirageStock.length > 0) {
                mirageGrid.innerHTML = '';
                const mFrag = document.createDocumentFragment();
                data.mirageStock.forEach((f, idx) => {
                    const rc = RC[f.rarity.toLowerCase()] || '';
                    const card = document.createElement('div');
                    card.className = `card mirage-card ${rc}`;
                    card.style.animationDelay = `${idx * 0.05}s`;
                    
                    const beli = new Intl.NumberFormat('en-US').format(f.price);
                    const robux = new Intl.NumberFormat('en-US').format(f.robux);
                    
                    card.innerHTML = `
                        <span class="rarity-badge">${f.rarity}</span>
                        <div class="fruit-img-wrap">
                            <img class="fruit-img" src="assets/fruits/${f.name}.webp" alt="${f.name}" width="140" height="140" loading="lazy" decoding="async" onerror="this.style.opacity=0.3">
                        </div>
                        <div class="fruit-name">${f.name}</div>
                        <div class="fruit-type">${f.type}</div>
                        <div class="prices">
                            <div class="price-box"><span class="price-label">Beli</span><span class="price-val beli">${beli}</span></div>
                            <div class="price-box"><span class="price-label">Robux</span><span class="price-val robux">${robux}</span></div>
                        </div>
                    `;
                    mFrag.appendChild(card);
                });
                mirageGrid.appendChild(mFrag);
                document.getElementById('btn-mirage').style.display = 'flex';
            } else {
                mirageGrid.innerHTML = `<div style="text-align:center;padding:4rem 2rem;color:var(--muted);grid-column:1/-1;">Mirage Island is currently hidden...</div>`;
                document.getElementById('btn-mirage').style.display = 'none';
            }
        } catch(e) {
            console.error(e);
        }
    }

    function timeAgo(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        if (seconds < 60) return seconds + "s ago";
        let interval = seconds / 3600;
        if (interval > 1) {
            if (interval > 24) return Math.floor(interval/24) + "d ago";
            return Math.floor(interval) + "h ago";
        }
        return Math.floor(seconds/60) + "m ago";
    }

    // ─── LOAD HISTORY ───
    let historyData = [];
    let historyFilter = new Set(['all']);

    async function loadHistory() {
        if (historyData.length > 0) return;
        try {
            const res = await fetch('data/history.json?t=' + Date.now());
            historyData = await res.json();
            renderHistory();
        } catch(e) {
            document.getElementById('history-list').innerHTML =
                '<div style="text-align:center;padding:2rem;color:#f87171;font-size:0.85rem;">No history yet.</div>';
        }
    }

    function renderHistory() {
        const el = document.getElementById('history-list');
        el.innerHTML = '';
        
        let items = [...historyData].reverse();
        
        // Remove batch-level filter to show all resets
        // if (!historyFilter.has('all')) { ... }

        items.slice(0, 100).forEach(entry => {
            const d = new Date(entry.updated);
            const snapD = new Date(d);
            const resetHours = Math.floor(snapD.getUTCHours() / 4) * 4;
            snapD.setUTCHours(resetHours, 0, 0, 0);

            const timeStr = snapD.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            const dateStr = snapD.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit' });
            const relative = timeAgo(d);
            
            const bestFruit = entry.stock[0];
            const dotColor = bestFruit ? (RC[bestFruit.rarity.toLowerCase()] || 'rc-common') : 'rc-common';
            
            let fruitsToRender = entry.stock;
            let noMatch = false;
            if (!historyFilter.has('all')) {
                fruitsToRender = entry.stock.filter(f => historyFilter.has(f.rarity.toLowerCase()));
                if (fruitsToRender.length === 0) noMatch = true;
            }

            const fruitsHtml = noMatch 
                ? `<span style="color:var(--muted);font-size:0.75rem;opacity:0.4;font-style:italic;">No selected rarities in this stock</span>`
                : fruitsToRender.map(f => {
                    const rKey = f.rarity.toLowerCase();
                    const rcClass = RC[rKey] || 'rc-common';
                    return `<div class="tl-fruit ${rcClass}" data-name="${f.name}" style="--rc:var(--${rKey})">
                                <img src="assets/fruits/${f.name}.webp" alt="${f.name}" width="32" height="32" loading="lazy" onerror="this.style.opacity=0.3">
                            </div>`;
                }).join('');

            el.innerHTML += `
            <div class="timeline-item">
                <div class="timeline-dot ${dotColor}" style="--rc:var(--${bestFruit ? bestFruit.rarity.toLowerCase() : 'common'})"></div>
                <div class="timeline-content">
                    <div class="timeline-time">🕒 ${timeStr} · ${dateStr} <span style="color:var(--muted);opacity:0.6;margin-left:8px">(${relative})</span></div>
                    <div class="timeline-fruits">${fruitsHtml}</div>
                </div>
            </div>`;
        });

        if (items.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted);font-size:0.85rem;">No entries found for selected rarities.</div>';
        }
    }

    // History multi-filter events
    document.querySelectorAll('#history-filter .rf-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const r = btn.dataset.rarity;
            
            if (r === 'all') {
                historyFilter.clear();
                historyFilter.add('all');
                document.querySelectorAll('#history-filter .rf-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            } else {
                historyFilter.delete('all');
                document.querySelector('#history-filter [data-rarity="all"]').classList.remove('active');
                
                if (historyFilter.has(r)) {
                    historyFilter.delete(r);
                    btn.classList.remove('active');
                } else {
                    historyFilter.add(r);
                    btn.classList.add('active');
                }
                
                if (historyFilter.size === 0) {
                    historyFilter.add('all');
                    document.querySelector('#history-filter [data-rarity="all"]').classList.add('active');
                }
            }
            renderHistory();
        });
    });

    // ─── INIT ───
    // If user opens the page within 5 minutes AFTER a reset, immediately poll for new stock
    (function checkIfJustReset() {
        const now = new Date();
        const h = now.getUTCHours();
        const lastResetH = Math.floor(h / 4) * 4;
        const lastReset = new Date(now);
        lastReset.setUTCHours(lastResetH, 0, 0, 0);
        const msSinceReset = now - lastReset;
        // If we're within 5 minutes (300000ms) after a reset, start restocking mode immediately
        if (msSinceReset < 300000) {
            window.isWaitingForNewData = true;
            const wrap = document.getElementById('countdown-wrap');
            if (wrap) wrap.classList.add('is-restocking');
        }
    })();

    loadStock();
</script>
</body>
</html>
